<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mood Flow Tracker</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#ffc0cb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mood Flow">

<link rel="apple-touch-icon" href="icon.png">
</head>

<body>

<div class="tracker-container">
  <h2>Daily Tracker</h2>

  <!-- Creativity -->
  <label>Creativity</label>
  <input type="range" id="creativity" min="1" max="7" value="4">

  <!-- Productivity -->
  <label>Productivity</label>
  <input type="range" id="productivity" min="1" max="7" value="4">

  <h3>Track Your Day</h3>

  <label>Date</label>
  <input type="date" id="date">

  <label>Last Period Start</label>
  <input type="date" id="periodStart">

  <br><br>

  <button id="saveBtn">Save Entry</button>

  <h3>Saved Entries</h3>
  <ul id="entriesList"></ul>

  <!-- ✅ MOVE ANALYSIS HERE -->
  <button id="analysisBtn">Show Analysis</button>

  <div id="analysisContainer" style="display:none;">
    <h3>Analysis</h3>
    <div id="analysisBox"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
